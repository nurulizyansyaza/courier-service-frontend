name: CI

on:
  push:
    branches: [main, "issue_*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: courier-service-frontend
      - uses: actions/checkout@v4
        with:
          repository: nurulizyansyaza/courier-service-core
          ref: main
          path: courier-service-core
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: courier-service-frontend/package-lock.json
      - run: cd courier-service-core && npm ci && npm run build
      - run: cd courier-service-frontend && npm ci
      - run: cd courier-service-frontend && npx tsc --noEmit
      - run: cd courier-service-frontend && npm test
      - run: cd courier-service-frontend && npm run build

  trigger-deploy:
    name: Trigger Staging Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger staging deploy
        run: |
          gh workflow run deploy-staging.yml \
            --repo nurulizyansyaza/courier-service \
            --ref staging \
            -f deploy_target=all
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TRIGGER_TOKEN }}
